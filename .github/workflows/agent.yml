name: Daily Sports Agent

on:
  schedule:
    # 00:00 UTC is 8:00 PM EST / 9:00 PM EDT
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt
          
      - name: Generate Articles
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python agent/generate_articles.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles/ articles.html index.html
          git commit -m "🤖 Auto-generated daily articles" || echo "No changes to commit"
          git push
